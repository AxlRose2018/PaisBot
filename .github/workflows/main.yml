name: PaisBot_Automation
on:
  schedule:
    - cron: '0 12 * * 4' # ימי חמישי בשעה 14:00 שעון ישראל
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  run_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TELEGRAM_CHAT_ID: "833079885"
          TELEGRAM_TOKEN: "8710719112:AAEMijbd1-vo8AK9lE54jWImDSmxDYKPJgE"
        run: |
          pip install requests
          python check_pais.py
